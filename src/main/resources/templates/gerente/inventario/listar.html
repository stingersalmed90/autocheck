<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Inventario - Gerente</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ===== Variables ===== */
    :root {
      --blue-dark: #0A1D37;
      --blue-secondary: #1C3B5A;
      --gold: #F5A623;
      --gray: #4A4A4A;
      --white: #FFFFFF;
      --bg: #f4f6f9;
      --color-danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--blue-dark);
      margin: 0;
      display: flex;
      min-height: 100vh;
      margin-left: 260px;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 260px;
      height: 100vh;
      background: var(--blue-dark);
      color: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: fixed;
      left: 0;
      top: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
    .sidebar h3 { 
      color: var(--gold); 
      margin-bottom: 1.5rem; 
      text-align: center;
      font-size: 1.1rem;
    }
    .sidebar nav ul { list-style: none; padding: 0; margin: 0; }
    .sidebar nav ul li { margin: .8rem 0; }
    .sidebar nav ul li a {
      text-decoration: none; 
      color: #dcdcdc;
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: 1rem 1.5rem; 
      border-radius: 8px;
      transition: 0.3s;
    }
    .sidebar nav ul li a:hover { 
      background: var(--blue-secondary); 
      color: var(--gold); 
    }

    /* ===== Logout button ===== */
    .logout-btn {
      margin-top: 2rem; 
      background: var(--color-danger); 
      color: #fff;
      padding: .8rem 1rem; 
      border: none; 
      border-radius: 8px;
      font-weight: 600; 
      text-align: center; 
      cursor: pointer;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: .5rem;
      transition: background 0.3s;
    }
    .logout-btn:hover { background: #d32f2f; }

    /* ===== Main ===== */
    .main { 
      flex: 1; 
      padding: 2rem; 
      overflow-y: auto; 
    }
    .main h1 { 
      color: var(--blue-dark); 
      font-size: 2rem; 
      margin-bottom: 1.5rem; 
      display: flex; 
      align-items: center; 
      gap: .6rem;
      font-weight: 700;
    }

    /* ===== Tabla ===== */
    table {
      width: 100%; 
      border-collapse: collapse; 
      background: var(--white);
      border-radius: 16px; 
      overflow: hidden; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
      margin-top: 1.5rem;
    }
    thead { 
      background: var(--blue-secondary); 
      color: var(--white); 
    }
    th, td { 
      padding: .9rem 1rem; 
      text-align: left; 
    }
    tbody tr { 
      border-bottom: 1px solid #eee; 
      transition: background 0.3s; 
    }
    tbody tr:hover { 
      background: #f9fafc; 
    }

    /* ===== Botones ===== */
    .btn {
      background: var(--gold); 
      color: var(--blue-dark); 
      padding: .6rem 1.2rem;
      border-radius: 8px; 
      font-weight: 600; 
      border: none; 
      cursor: pointer;
      text-decoration: none; 
      transition: background 0.3s;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
    }
    .btn:hover { background: #e2b03f; }
    .btn-danger { 
      background: var(--color-danger); 
      color: #fff; 
    }
    .btn-danger:hover { background: #d32f2f; }
    .btn.ghost { 
      background: transparent; 
      border: 1px solid var(--gold); 
      color: var(--blue-dark); 
    }
    .btn.ghost:hover { 
      background: var(--gold); 
      color: var(--blue-dark); 
    }

    .actions { 
      display: flex; 
      gap: .6rem; 
    }
    
    /* Estilos para filtros y contenedores */
    .actions-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
    }

    .inactive-row {
      opacity: 0.7;
      background: rgba(0,0,0,0.05);
    }

    .badge {
      padding: 0.3rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .badge-success {
      background-color: #28a745;
      color: white;
    }

    .badge-danger {
      background-color: #dc3545;
      color: white;
    }

    .text-success {
      color: #28a745 !important;
    }

    .text-secondary {
      color: #6c757d !important;
    }

    .btn-warning {
      background-color: #ffc107;
      color: var(--blue-dark);
    }

    .btn-warning:hover {
      background-color: #e0a800;
    }

    .btn-success {
      background-color: #28a745;
      color: #fff;
    }

    .btn-success:hover {
      background-color: #218838;
    }

    .btn-primary {
      background-color: var(--gold);
      color: var(--blue-dark);
    }

    .btn-primary:hover {
      background-color: #e2b03f;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <h3>Panel de Control</h3>
      <nav>
        <ul>
          <li><a th:href="@{/gerente}"><i class="fa-solid fa-house"></i> Inicio</a></li>          
          <li><a th:href="@{/gerente/inventario}"><i class="fa-solid fa-warehouse"></i> Inventario</a></li>          
          <li><a href="/gerente/novedades"><i class="fa-solid fa-bullhorn"></i> Novedades</a></li>
          <li><a href="/gerente/notificaciones"><i class="fa-solid fa-bell"></i> Notificaciones</a></li>

        </ul>
      </nav>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
    </form>
  </aside>

  <!-- Main -->
  <main class="main">
    <h1><i class="fa-solid fa-warehouse"></i> Inventario</h1>
    
    <div class="actions-row">
      <a th:href="@{/gerente/inventario/crear}" class="btn"><i class="fa-solid fa-plus"></i> Nuevo Registro</a>
      
      <div class="filters">
        <a th:href="@{/gerente/inventario}" class="btn" th:classappend="${mostrarInactivos == null || !mostrarInactivos} ? 'btn-primary' : ''">
          <i class="fas fa-check-circle"></i> Mostrar Activos
        </a>
        <a th:href="@{/gerente/inventario(mostrarInactivos=true)}" class="btn" th:classappend="${mostrarInactivos} ? 'btn-primary' : ''">
          <i class="fas fa-list"></i> Mostrar Todos
        </a>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Marca</th>
          <th>Modelo</th>
          <th>Año</th>
          <th>Ubicación</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="i : ${inventarios}" th:class="${!i.activo ? 'inactive-row' : ''}">
          <td th:text="${i.idInventario}"></td>
          <td th:text="${i.marca}"></td>
          <td th:text="${i.modelo}"></td>
          <td th:text="${i.anio}"></td>
          <td th:text="${i.ubicacionActual}"></td>
          <td>
            <span th:text="${i.activo ? 'Activo' : 'Inactivo'}"
                  th:class="${i.activo ? 'badge badge-success' : 'badge badge-danger'}">
            </span>
          </td>
          <td>
            <div class="actions">
              <a th:href="@{/gerente/inventario/editar/{id}(id=${i.idInventario})}" class="btn ghost">
                <i class="fa-solid fa-pen"></i> Editar
              </a>
              <form th:action="@{/gerente/inventario/cambiar-estado/{id}(id=${i.idInventario})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn" 
                        th:classappend="${i.activo ? 'btn-warning' : 'btn-success'}"
                        th:onclick="'return confirm(\\'¿Estás seguro de ' + (${i.activo} ? 'desactivar' : 'activar') + ' este vehículo?\\');'">
                    <i class="fas" th:classappend="${i.activo ? 'fa-toggle-on' : 'fa-toggle-off'}"></i>
                    <span>Estado: </span>
                    <span th:text="${i.activo ? 'Activo' : 'Inactivo'}"
                          th:class="${i.activo ? 'text-success' : 'text-secondary'}">
                    </span>
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>  
  </main>
</body>
</html>
