<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Novedades - Gerente</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --blue-dark: #0A1D37;
      --blue-secondary: #1C3B5A;
      --gold: #F5A623;
      --gray: #4A4A4A;
      --white: #FFFFFF;
      --bg: #f4f6f9;
      --color-danger: #ef4444;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--blue-dark);
      margin: 0;
      display: flex;
      min-height: 100vh;
      margin-left: 260px;
    }
    .sidebar {
      width: 260px;
      height: 100vh;
      background: var(--blue-dark);
      color: var(--white);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      position: fixed;
      left: 0;
      top: 0;
    }
    .sidebar h3 { 
      color: var(--gold); 
      margin-bottom: 1.5rem; 
      text-align: center;
      font-size: 1.1rem;
    }
    .sidebar nav ul { list-style: none; padding: 0; margin: 0; }
    .sidebar nav ul li { margin: .8rem 0; }
    .sidebar nav ul li a {
      text-decoration: none; 
      color: #dcdcdc; 
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: 1rem 1.5rem; 
      border-radius: 8px; 
      transition: 0.3s;
    }
    .sidebar nav ul li a:hover { 
      background: var(--blue-secondary); 
      color: var(--gold); 
    }
    .logout-btn {
      margin-top: 2rem; 
      background: var(--color-danger); 
      color: #fff;
      padding: .8rem 1rem; 
      border: none; 
      border-radius: 8px;
      font-weight: 600; 
      cursor: pointer; 
      transition: background 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .logout-btn:hover { background: #d32f2f; }
    .main { 
      flex: 1; 
      padding: 2rem; 
    }
    .main h1 { 
      color: var(--blue-dark); 
      font-size: 2rem; 
      margin-bottom: 1.2rem; 
      display: flex; 
      align-items: center; 
      gap: .6rem;
      font-weight: 700;
    }
    table {
      width: 100%; 
      border-collapse: collapse; 
      background: var(--white);
      border-radius: 16px; 
      overflow: hidden; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-top: 1.5rem;
    }
    thead { 
      background: var(--blue-secondary); 
      color: var(--white);
      font-weight: 600;
    }
    th, td { 
      padding: .9rem 1rem; 
      text-align: left; 
    }
    tbody tr { 
      border-bottom: 1px solid #eee; 
      transition: background 0.3s; 
    }
    tbody tr:hover { 
      background: #f9fafc; 
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <h3>Panel Gerente</h3>
      <nav>
        <ul>
          <li><a th:href="@{/gerente}"><i class="fa-solid fa-home"></i> Inicio</a></li>
          <li><a th:href="@{/gerente/vehiculos}"><i class="fa-solid fa-car"></i> Vehículos</a></li>
          <li><a th:href="@{/gerente/inventario}"><i class="fa-solid fa-box"></i> Inventario</a></li>
          <li><a th:href="@{/gerente/novedades}"><i class="fa-solid fa-bullhorn"></i> Novedades</a></li>
          <li><a href="/gerente/notificaciones"><i class="fa-solid fa-bell"></i> Notificaciones</a></li>


        </ul>
      </nav>
    </div>
    <form th:action="@{/logout}" method="post" style="margin:0;">
      <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
    </form>
  </aside>

  <!-- Main -->
  <main class="main">
    <h1><i class="fa-solid fa-bullhorn"></i> Novedades</h1>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Tipo</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th>Usuario</th>
          <th>Evidencia</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="n : ${novedades}">
          <td th:text="${n.idNovedades}">1</td>
          <td th:text="${n.tipoNovedad}">Mecánica</td>
          <td th:text="${n.descripcion}">Revisión de frenos</td>
          <td th:text="${n.estado}">Pendiente</td>
          <td th:text="${n.usuario != null ? n.usuario.nombre : '---'}">Juan</td>
          <td>
                <i class="fa-solid fa-image"></i> Ver
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
