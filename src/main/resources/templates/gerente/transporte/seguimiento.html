<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Envíos</title>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: Arial; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        th { color: #ffcc00; }
        a { color: #ffcc00; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn-back {
            background: #ffcc00;
            padding: 10px 15px;
            border-radius: 8px;
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<a class="btn-back" th:href="@{/transporte}">⬅ Volver</a>

<h1>📦 Seguimiento de Envíos</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Origen</th>
        <th>Destino</th>
        <th>Estado</th>
        <th>ETA</th>
        <th>Acciones</th>
    </tr>

    <tr th:each="envio : ${envios}">
        <td th:text="${envio.id}">1</td>
        <td th:text="${envio.origen}">Shanghái</td>
        <td th:text="${envio.destino}">Buenaventura</td>
        <td th:text="${envio.estado}">En tránsito</td>
        <td th:text="${envio.eta}">2025-12-12</td>

        <td>
            <a th:href="@{'/transporte/detalle/' + ${envio.id}}">Ver Detalle</a>
        </td>
    </tr>

</table>

</body>
</html>
